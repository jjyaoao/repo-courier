name: Daily RepoCourier

on:
  schedule:
    # 每天北京时间 09:00（UTC 01:00）
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-courier-daily
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install RepoCourier
        run: pip install .
      - name: Generate and deliver report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_LLM_API_KEY: ${{ secrets.REPO_LLM_API_KEY }}
          REPO_LLM_BASE_URL: ${{ secrets.REPO_LLM_BASE_URL }}
          REPO_LLM_MODEL: ${{ secrets.REPO_LLM_MODEL }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          ONEBOT_URL: ${{ secrets.ONEBOT_URL }}
          ONEBOT_TOKEN: ${{ secrets.ONEBOT_TOKEN }}
          ONEBOT_USER_ID: ${{ secrets.ONEBOT_USER_ID }}
        run: repo-courier --config config/config.yaml
