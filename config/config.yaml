github:
  enabled: true
  language: ""
  since: daily
  spoken_language_code: ""
  limit: 20
  include_readme: true
  readme_max_chars: 4000

profile:
  interests:
    - agent
    - llm
    - mcp
    - ai
  exclude_keywords:
    - awesome list
    - interview
    - tutorial collection
  daily_picks: 3

repo_llm:
  enabled: true
  base_url: https://www.dmxapi.cn/v1/chat/completions
  model: "glm-5"
  verify_ssl: true
  timeout_seconds: 90

rss:
  defaults:
    max_items_per_source: 6
    llm_candidates: 6
    top_k: 3
    max_input_tokens: 10000
    token_encoding: cl100k_base
    max_analysis_workers: 10
  channels:
    news:
      title: 科技新闻
      enabled: true
      prompt: repo_courier.prompts.news:build_messages
      sources:
        - id: mit-technology-review
          name: MIT Technology Review
          url: https://www.technologyreview.com/feed/
        - id: the-verge
          name: The Verge
          url: https://www.theverge.com/rss/index.xml
        - id: wired
          name: WIRED
          url: https://www.wired.com/feed/rss
        - id: ars-technica
          name: Ars Technica
          url: https://feeds.arstechnica.com/arstechnica/index
    blogs:
      title: 大厂博客
      enabled: true
      prompt: repo_courier.prompts.blogs:build_messages
      sources:
        - id: openai
          name: OpenAI News
          url: https://openai.com/news/rss.xml
        - id: google-deepmind
          name: Google DeepMind
          url: https://deepmind.google/blog/rss.xml
        - id: google-ai
          name: Google AI
          url: https://blog.google/innovation-and-ai/technology/ai/rss/
        - id: hugging-face
          name: Hugging Face Blog
          url: https://huggingface.co/blog/feed.xml
    academic:
      title: 学术论文
      enabled: true
      prompt: repo_courier.prompts.academic:build_messages
      sources:
        - id: arxiv-ai
          name: arXiv AI · NLP · CV · ML
          url: https://rss.arxiv.org/rss/cs.AI+cs.CL+cs.CV+cs.LG
    products:
      title: 产品更新
      enabled: true
      prompt: repo_courier.prompts.products:build_messages
      sources:
        - id: gemini-cli
          name: Gemini CLI Releases
          url: https://github.com/google-gemini/gemini-cli/releases.atom
        - id: openai-codex
          name: OpenAI Codex Releases
          url: https://github.com/openai/codex/releases.atom
        - id: claude-code
          name: Claude Code Releases
          url: https://github.com/anthropics/claude-code/releases.atom
        - id: openclaw
          name: OpenClaw Releases
          url: https://github.com/openclaw/openclaw/releases.atom
    security:
      title: 安全资讯
      enabled: true
      prompt: repo_courier.prompts.security:build_messages
      sources:
        - id: krebs-on-security
          name: Krebs on Security
          url: https://krebsonsecurity.com/feed/
        - id: the-hacker-news
          name: The Hacker News
          url: https://feeds.feedburner.com/TheHackersNews
        - id: google-security
          name: Google Online Security Blog
          url: https://feeds.feedburner.com/GoogleOnlineSecurityBlog
        - id: anquanke
          name: 安全客
          url: https://api.anquanke.com/data/v1/rss

wechat:
  enabled: true
  title: 微信公众号
  api_base_url: https://down.mptext.top/api/public/v1
  verify_ssl: false
  content_max_chars: 5000
  prompt: repo_courier.prompts.wechat:build_messages
  accounts:
    - name: 机器之心
      fakeid: MzA3MzI4MjgzMw==
    - name: 量子位
      fakeid: MzIzNjc1NzUzMw==
    - name: 新智元
      fakeid: MzI3MTA0MTk1MA==
    - name: 阿里云开发者
      fakeid: MzIzOTU0NTQ0MA==
    - name: 腾讯云开发者
      fakeid: MzI2NDU4OTExOQ==
    - name: Datawhale
      fakeid: MzIyNjM2MzQyNg==

report:
  output_dir: reports
  data_dir: data/history
  title: RepoCourier · 个性化科技速递
  product_display_names:
    gemini-cli: Gemini CLI
    openai-codex: OpenAI Codex
    claude-code: Claude Code
    openclaw: OpenClaw

push:
  enabled: true
