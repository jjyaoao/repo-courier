github:
  # 可选：python、go、rust、javascript 等；留空表示全部语言
  language: ""
  # daily / weekly / monthly
  since: daily
  spoken_language_code: ""
  # 多抓一些候选，再从中选出最适合你的 3 个
  limit: 20
  include_readme: true
  readme_max_chars: 4000

summary:
  enabled: true
  # 密钥和模型推荐通过 AI_API_KEY、AI_MODEL 环境变量传入
  base_url: https://api.openai.com/v1
  model: ""
  language: zh-CN
  timeout_seconds: 90

profile:
  # 这是 RepoCourier 唯一需要你认真填写的配置。
  # 推荐使用仓库描述和 Topics 中常见的英文关键词。
  interests:
    - agent
    - llm
    - mcp
    - developer tools
    - automation
    - self-hosted
  exclude_keywords:
    - awesome list
    - interview
    - tutorial collection
  daily_picks: 3

academic:
  # 可选扩展：默认关闭，避免改变 RepoCourier 的 GitHub 三选主流程。
  enabled: false
  # Academic 密钥只通过 ACADEMIC_API_KEY 环境变量导入。
  # 填写完整的 Chat Completions 接口地址，代码不会再追加路径。
  base_url: https://api.openai.com/v1/chat/completions
  model: ""
  verify_ssl: true
  sources:
    arxiv:
      enabled: true
      # 最多拉取的候选数；规则初筛数量固定为 final_picks 的 2 倍
      candidate_limit: 50
      page_size: 10
      request_interval_seconds: 3.0
      final_picks: 3
      introduction_max_chars: 12000
      max_analysis_workers: 50

tech_blog:
  enabled: true
  final_picks: 5
  max_analysis_workers: 10
  content_max_chars: 6000
  sources:
    - id: openai
      name: OpenAI News
      url: https://openai.com/news/rss.xml
    - id: google
      name: Google The Keyword
      url: https://blog.google/rss/
    - id: microsoft-research
      name: Microsoft Research
      url: https://www.microsoft.com/en-us/research/feed/
    - id: aws-machine-learning
      name: AWS Machine Learning
      url: https://aws.amazon.com/blogs/machine-learning/feed/
    - id: meta-engineering
      name: Meta Engineering
      url: https://engineering.fb.com/feed/
    - id: github
      name: GitHub Blog
      url: https://github.blog/feed/
    - id: cloudflare
      name: Cloudflare Blog
      url: https://blog.cloudflare.com/rss/
    - id: nvidia-developer
      name: NVIDIA Developer Blog
      url: https://developer.nvidia.com/blog/feed/
    - id: netflix-techblog
      name: Netflix TechBlog
      url: https://netflixtechblog.com/feed
    - id: salesforce-engineering
      name: Salesforce Engineering
      url: https://engineering.salesforce.com/feed/

tech_news:
  enabled: true
  final_picks: 3
  max_analysis_workers: 6
  content_max_chars: 6000
  sources:
    - id: microsoft
      name: Microsoft Official Blog
      url: https://blogs.microsoft.com/feed/
    - id: aws-news
      name: AWS News Blog
      url: https://aws.amazon.com/blogs/aws/feed/
    - id: apple-newsroom
      name: Apple Newsroom
      url: https://www.apple.com/newsroom/rss-feed.rss
    - id: nvidia
      name: NVIDIA Blog
      url: https://blogs.nvidia.com/feed/

report:
  output_dir: reports
  data_dir: data/history
  title: RepoCourier · 个性化开源速递

push:
  enabled: true
  # Webhook/密钥全部使用环境变量，避免提交到仓库
